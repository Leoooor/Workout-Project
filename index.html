<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#141416">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Tracker Kalistenik</title>
<style>
  :root{
    --base:#141416;
    --base-2:#1b1b1e;
    --surface:rgba(255,255,255,0.045);
    --surface-solid:#232326;
    --surface-hi:rgba(255,255,255,0.08);
    --chalk:#f3f2ec;
    --chalk-dim:#93928d;
    --mustard:#e0b94a;
    --mustard-dim:rgba(224,185,74,0.16);
    --rust:#c15a45;
    --rust-dim:rgba(193,90,69,0.16);
    --sage:#82a879;
    --sage-dim:rgba(130,168,121,0.16);
    --line:rgba(255,255,255,0.08);
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
    --font-display: 'Arial Black', Arial, sans-serif;
    --font-body: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    --font-mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--base);color:var(--chalk);font-family:var(--font-body); overscroll-behavior-y:none;}
  body{
    padding-bottom:82px; min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, rgba(224,185,74,0.06), transparent 45%),
      radial-gradient(circle at 100% 30%, rgba(193,90,69,0.05), transparent 40%),
      var(--base);
  }

  header.top{
    padding:20px 18px 16px; position:sticky; top:0; z-index:20;
    background:rgba(20,20,22,0.82); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
    transition:padding .2s ease;
  }
  .top-row{display:flex; justify-content:space-between; align-items:flex-end;}
  header.top .eyebrow{
    font-family:var(--font-mono); font-size:10.5px; letter-spacing:2.5px;
    color:var(--mustard); text-transform:uppercase; margin-bottom:5px; display:flex; align-items:center; gap:6px;
  }
  .streak-pill{
    font-family:var(--font-mono); font-size:11px; background:var(--mustard-dim); color:var(--mustard);
    padding:5px 11px; border-radius:20px; display:flex; align-items:center; gap:5px; white-space:nowrap;
  }
  header.top h1{
    font-family:var(--font-display); font-size:27px; letter-spacing:0.3px;
    margin:0; text-transform:uppercase;
  }

  main{padding:16px; position:relative; min-height:60vh;}
  .view{display:none;}
  .view.active{display:block; animation:viewIn .28s cubic-bezier(.2,.8,.2,1);}
  @keyframes viewIn{from{opacity:0; transform:translateY(10px) scale(.99);} to{opacity:1; transform:translateY(0) scale(1);}}

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    backdrop-filter:blur(6px);
  }

  .day-block{margin-bottom:16px;}
  .day-block.today .day-title{color:var(--mustard);}
  .day-block.today{
    background:linear-gradient(135deg, rgba(224,185,74,0.08), transparent 60%);
    border-radius:16px; padding:10px; margin:-10px -10px 16px;
  }
  .day-title{
    font-family:var(--font-display); font-size:14.5px; text-transform:uppercase;
    letter-spacing:1px; display:flex; align-items:center; gap:8px; margin-bottom:9px;
    padding:0 2px 7px; border-bottom:1px solid var(--line);
  }
  .today-badge{
    font-family:var(--font-mono); font-size:9px; background:var(--mustard); color:#141416;
    padding:2px 7px; border-radius:10px; letter-spacing:0.5px; margin-left:auto;
  }
  .fokus-dot{width:8px;height:8px;border-radius:50%; flex-shrink:0; box-shadow:0 0 8px currentColor;}
  .fokus-push{background:var(--rust); color:var(--rust);}
  .fokus-pull{background:var(--mustard); color:var(--mustard);}
  .fokus-lower{background:#6f9fc4; color:#6f9fc4;}
  .fokus-full{background:#b07bc0; color:#b07bc0;}
  .fokus-rest{background:var(--chalk-dim); color:var(--chalk-dim);}

  .move-card{
    padding:11px 13px; margin-bottom:7px; display:flex; justify-content:space-between; align-items:center; gap:10px;
    transition:transform .12s ease, background .12s ease;
  }
  .move-card:active{transform:scale(0.98); background:var(--surface-hi);}
  .move-name{font-weight:600; font-size:14.5px;}
  .move-sub{font-size:11.5px; color:var(--chalk-dim); margin-top:2px;}
  .move-rep-wrap{display:flex; flex-direction:column; align-items:flex-end; gap:3px;}
  .move-rep{
    font-family:var(--font-mono); font-size:13px; color:var(--mustard);
    white-space:nowrap; text-align:right;
  }
  .move-rest{
    font-family:var(--font-mono); font-size:10px; color:var(--chalk-dim);
    background:var(--surface-hi); padding:2px 7px; border-radius:20px; white-space:nowrap;
  }

  .info-rest{padding:14px; margin-bottom:18px;}
  .info-rest-title{
    font-family:var(--font-display); font-size:13px; text-transform:uppercase;
    letter-spacing:1px; color:var(--mustard); margin-bottom:9px;
  }
  .info-rest-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    font-size:12px; color:var(--chalk-dim); padding:6px 0; border-bottom:1px dashed var(--line);
  }
  .info-rest-row:last-child{border-bottom:none;}
  .info-rest-row b{font-family:var(--font-mono); color:var(--chalk); font-size:12px; white-space:nowrap;}

  .info-safety{padding:14px; margin-bottom:18px; border-color:var(--rust-dim);}
  .info-safety-item{
    font-size:12px; color:var(--chalk-dim); padding:7px 0 7px 18px; position:relative;
    border-bottom:1px dashed var(--line);
  }
  .info-safety-item:last-child{border-bottom:none;}
  .info-safety-item::before{content:"⚠"; position:absolute; left:0; color:var(--rust); font-size:11px;}

  .backup-card{padding:16px; margin-bottom:18px;}
  .backup-desc{font-size:12px; color:var(--chalk-dim); margin-bottom:12px; line-height:1.5;}
  .import-btn{
    display:block; width:100%; text-align:center; background:var(--surface-solid); color:var(--chalk);
    border:1px solid var(--line); border-radius:10px; font-family:var(--font-display); font-size:13px;
    letter-spacing:1.2px; text-transform:uppercase; padding:13px; margin-top:9px; cursor:pointer;
    transition:transform .1s ease;
  }
  .import-btn:active{transform:scale(0.97);}

  .section-title{
    font-family:var(--font-display); font-size:13.5px; text-transform:uppercase;
    letter-spacing:1px; margin:20px 0 10px; color:var(--mustard);
    display:flex; align-items:center; justify-content:space-between;
  }
  .section-title:first-child{margin-top:0;}

  .ring-wrap{display:flex; align-items:center; gap:6px;}
  .ring{transform:rotate(-90deg);}
  .ring-bg{fill:none; stroke:var(--line); stroke-width:4;}
  .ring-fg{fill:none; stroke:var(--mustard); stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset .5s cubic-bezier(.2,.8,.2,1);}
  .ring-label{font-family:var(--font-mono); font-size:10.5px; color:var(--chalk-dim);}

  .variasi-row{
    padding:11px 13px; margin-bottom:8px; overflow:hidden; transition:transform .15s ease, opacity .15s ease;
  }
  .variasi-top{display:flex; align-items:center; gap:11px;}
  .check-btn{
    width:28px; height:28px; border-radius:8px; flex-shrink:0; cursor:pointer; position:relative;
    border:2px solid var(--chalk-dim); display:flex; align-items:center; justify-content:center;
    transition:all .25s cubic-bezier(.34,1.56,.64,1);
  }
  .check-btn.done{border-color:var(--sage); background:var(--sage-dim); transform:scale(1.04);}
  .check-btn svg{width:16px; height:16px;}
  .check-btn path{
    stroke:var(--sage); stroke-width:3; fill:none; stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray:20; stroke-dashoffset:20; transition:stroke-dashoffset .3s ease .05s;
  }
  .check-btn.done path{stroke-dashoffset:0;}
  .variasi-info{flex:1; min-width:0;}
  .variasi-name{font-weight:600; font-size:14px;}
  .variasi-crit{font-size:11.5px; color:var(--chalk-dim); margin-top:1px;}
  .variasi-gate{font-size:10.5px; color:var(--sage); margin-top:4px; font-family:var(--font-mono);}
  .variasi-week{font-family:var(--font-mono); font-size:10px; color:var(--chalk-dim); white-space:nowrap;}
  .variasi-date{
    margin-top:9px; padding-top:9px; border-top:1px dashed var(--line);
    display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--chalk-dim);
    animation:viewIn .2s ease;
  }
  .variasi-date input{width:auto; background:var(--surface-solid); border:1px solid var(--line); color:var(--chalk);
    font-family:var(--font-mono); font-size:11.5px; border-radius:6px; padding:5px 8px;}

  .chart-card{padding:14px; margin-bottom:18px;}
  .chart-title{font-size:11px; color:var(--chalk-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; font-family:var(--font-mono);}
  .bars{display:flex; align-items:flex-end; gap:6px; height:64px;}
  .bar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:5px;}
  .bar{
    width:100%; background:linear-gradient(180deg, var(--mustard), rgba(224,185,74,0.35));
    border-radius:5px 5px 2px 2px; min-height:3px; transition:height .5s cubic-bezier(.2,.8,.2,1);
  }
  .bar-lbl{font-family:var(--font-mono); font-size:9px; color:var(--chalk-dim);}

  form.logform{padding:16px; margin-bottom:18px;}
  form.logform .row{display:flex; gap:8px; margin-bottom:10px;}
  form.logform .row > *{flex:1;}
  label.mini{font-size:10px; color:var(--chalk-dim); text-transform:uppercase; letter-spacing:0.6px; display:block; margin-bottom:4px;}
  input, select, textarea{
    width:100%; background:var(--surface-solid); border:1px solid var(--line); color:var(--chalk);
    font-family:var(--font-body); font-size:13.5px; border-radius:8px; padding:9px 10px;
    transition:border-color .15s ease;
  }
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--mustard);}
  textarea{resize:vertical; min-height:40px;}
  button.primary{
    width:100%; background:var(--mustard); color:#141416; border:none; border-radius:10px;
    font-family:var(--font-display); font-size:13px; letter-spacing:1.2px; text-transform:uppercase;
    padding:13px; margin-top:6px; cursor:pointer; position:relative; overflow:hidden;
    transition:transform .1s ease;
  }
  button.primary:active{transform:scale(0.97);}

  .log-wrap{position:relative; margin-bottom:9px; border-radius:14px; overflow:hidden;}
  .log-del-bg{
    position:absolute; inset:0; background:var(--rust); display:flex; align-items:center; justify-content:flex-end;
    padding-right:20px; color:#fff; font-family:var(--font-display); font-size:12px; letter-spacing:1px;
  }
  .log-entry{
    padding:12px 14px; position:relative; background:var(--base);
    transition:transform .2s ease;
  }
  .log-entry-top{display:flex; justify-content:space-between; align-items:baseline;}
  .log-date{font-family:var(--font-mono); font-size:12px; color:var(--mustard);}
  .log-status{font-size:10px; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:0.5px;}
  .status-Selesai{background:var(--sage-dim); color:var(--sage);}
  .status-Skip{background:var(--rust-dim); color:var(--rust);}
  .status-Lupa{background:rgba(147,146,141,0.16); color:var(--chalk-dim);}
  .log-gerakan{font-weight:600; font-size:14.5px; margin-top:4px;}
  .log-sets{font-family:var(--font-mono); font-size:12.5px; color:var(--chalk-dim); margin-top:5px;}
  .log-note{font-size:12px; color:var(--chalk-dim); margin-top:6px; font-style:italic;}
  .swipe-hint{text-align:center; font-size:10.5px; color:var(--chalk-dim); margin:-6px 0 14px; font-family:var(--font-mono);}

  .empty-state{text-align:center; padding:50px 20px; color:var(--chalk-dim); font-size:13px;}
  .empty-state .big{font-size:36px; margin-bottom:10px; display:block; animation:float 2.4s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);}}

  .baseline-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:12px 14px; margin-bottom:8px;
  }
  .baseline-row label{font-size:13.5px; font-weight:600;}
  .baseline-auto-tag{font-family:var(--font-mono); font-size:9.5px; color:var(--mustard); margin-top:2px;}
  .baseline-row input{width:90px; text-align:right; font-family:var(--font-mono);}
  .baseline-row input:disabled{color:var(--mustard); border-color:var(--mustard-dim); opacity:0.9;}

  nav.bottom{
    position:fixed; bottom:0; left:0; right:0; height:70px;
    background:rgba(27,27,30,0.85); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border-top:1px solid var(--line); display:flex; z-index:30; padding-bottom:env(safe-area-inset-bottom);
  }
  nav.bottom .indicator{
    position:absolute; top:8px; height:calc(100% - 16px); width:calc(25% - 8px);
    background:var(--mustard-dim); border-radius:12px; transition:transform .3s cubic-bezier(.2,.8,.2,1);
    left:4px;
  }
  nav.bottom button{
    flex:1; background:none; border:none; color:var(--chalk-dim); z-index:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; font-family:var(--font-body); font-size:10px; letter-spacing:0.3px;
    text-transform:uppercase; cursor:pointer; transition:color .2s ease, transform .15s ease;
  }
  nav.bottom button:active{transform:scale(0.92);}
  nav.bottom button .ico{font-size:20px; transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
  nav.bottom button.active{color:var(--mustard);}
  nav.bottom button.active .ico{transform:translateY(-2px) scale(1.1);}

  .save-toast{
    position:fixed; bottom:88px; left:50%; transform:translateX(-50%) translateY(24px) scale(.9);
    background:rgba(130,168,121,0.95); color:#152016; font-family:var(--font-mono); font-size:12px;
    padding:9px 18px; border-radius:24px; opacity:0; pointer-events:none;
    transition:all .3s cubic-bezier(.34,1.56,.64,1); z-index:40; display:flex; align-items:center; gap:6px;
    box-shadow:var(--shadow);
  }
  .save-toast.show{opacity:1; transform:translateX(-50%) translateY(0) scale(1);}

  .confetti{position:fixed; width:6px; height:6px; pointer-events:none; z-index:50; border-radius:1px;}

  ::-webkit-scrollbar{display:none;}
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div>
      <div class="eyebrow">Home Program · 12 Minggu</div>
      <h1 id="pageTitle">Jadwal</h1>
    </div>
    <div class="streak-pill" id="streakPill">🔥 0 hari</div>
  </div>
</header>

<main>
  <section class="view active" id="view-jadwal"></section>
  <section class="view" id="view-progres"></section>

  <section class="view" id="view-log">
    <div class="card chart-card">
      <div class="chart-title">Volume 7 Hari Terakhir (Total Reps)</div>
      <div class="bars" id="volBars"></div>
    </div>

    <form class="logform card" id="logForm">
      <div class="row">
        <div>
          <label class="mini">Tanggal</label>
          <input type="date" id="f-tanggal" required>
        </div>
        <div>
          <label class="mini">Hari</label>
          <select id="f-hari">
            <option>Senin</option><option>Selasa</option><option>Rabu</option>
            <option>Kamis</option><option>Jumat</option><option>Sabtu</option><option>Minggu</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label class="mini">Gerakan</label>
          <select id="f-gerakan" required></select>
        </div>
      </div>
      <div class="row">
        <div><label class="mini">Set1</label><input type="number" id="f-s1" min="0"></div>
        <div><label class="mini">Set2</label><input type="number" id="f-s2" min="0"></div>
        <div><label class="mini">Set3</label><input type="number" id="f-s3" min="0"></div>
        <div><label class="mini">Set4</label><input type="number" id="f-s4" min="0"></div>
      </div>
      <div class="row">
        <div>
          <label class="mini">RPE (1-10)</label>
          <input type="number" id="f-rpe" min="1" max="10">
        </div>
        <div>
          <label class="mini">Status</label>
          <select id="f-status">
            <option>Selesai</option><option>Skip</option><option>Lupa</option>
          </select>
        </div>
      </div>
      <label class="mini">Catatan</label>
      <textarea id="f-catatan" placeholder="opsional..."></textarea>
      <button type="submit" class="primary">+ Simpan Log</button>
    </form>

    <div class="swipe-hint" id="swipeHint">← geser kiri untuk hapus</div>
    <div id="logList"></div>
  </section>

  <section class="view" id="view-baseline">
    <div class="section-title">Baseline Minggu 0</div>
    <div id="baselineList"></div>

    <div class="section-title">Backup Data</div>
    <div class="card backup-card">
      <div class="backup-desc">Data cuma tersimpan di HP ini. Export tiap minggu biar aman kalau ganti HP / cache kehapus.</div>
      <button id="btnExport" class="primary">⬇️ Export Data (.json)</button>
      <label class="import-btn" for="fileImport">⬆️ Import Data (.json)</label>
      <input type="file" id="fileImport" accept="application/json" hidden>
    </div>
  </section>
</main>

<div class="save-toast" id="toast">✓ Tersimpan</div>

<nav class="bottom">
  <div class="indicator" id="navIndicator"></div>
  <button data-view="jadwal" class="active"><span class="ico">📅</span>Jadwal</button>
  <button data-view="progres"><span class="ico">🏆</span>Progres</button>
  <button data-view="log"><span class="ico">📝</span>Log</button>
  <button data-view="baseline"><span class="ico">📊</span>Baseline</button>
</nav>

<script>
/* ---------- DATA ---------- */
const HARI_ORDER = ["Senin","Selasa","Rabu","Kamis","Jumat","Sabtu","Minggu"];
const JADWAL = [
  {hari:"Senin", fokus:"Push", moves:[
    ["Push-up","4x max","Turun pelan 3 detik","60-90 detik"],
    ["Pike push-up","3x10","Bahu","60-90 detik"],
    ["Diamond push-up","3x10","Trisep","60-90 detik"],
    ["Dip di kursi","3x12","Trisep & dada bawah","60-90 detik"],
  ]},
  {hari:"Selasa", fokus:"Pull", moves:[
    ["Pull-up","4x max-2","Grip standar (lebar bahu). Sisakan 2 rep, jangan gagal total","90-120 detik"],
    ["Australian row","3x12","Punggung tengah","60-90 detik"],
    ["Dumbbell tas rows","3x15","Lat & bisep","60-90 detik"],
    ["Chin-up","3x max-2","Bisep dominan. Sisakan 2 rep","90-120 detik"],
  ]},
  {hari:"Rabu", fokus:"Rest", moves:[["Jalan kaki + stretching","30 menit","Pemulihan","-"]]},
  {hari:"Kamis", fokus:"Lower", moves:[
    ["Squat beban tas","4x15","","90-120 detik"],
    ["Bulgarian split squat","3x10/kaki","","90-120 detik"],
    ["Glute bridge","3x15","","60-90 detik"],
    ["Calf raise","3x20","","60-90 detik"],
  ]},
  {hari:"Jumat", fokus:"Full", moves:[
    ["Burpee","4x10","","30-45 detik"],
    ["Plank","3x45 detik","","45-60 detik"],
    ["Pull-up (grip netral/chin-up)","3x max-2","Ganti grip dari Selasa, kurangi stres tendon sama","90-120 detik"],
    ["Hanging knee raise","3x12","Core","60-90 detik"],
  ]},
  {hari:"Sabtu", fokus:"Rest", moves:[["Istirahat total","-","","-"]]},
  {hari:"Minggu", fokus:"Rest", moves:[["Istirahat total","-","","-"]]},
];
const PROGRES = {
  "Pull-up":[
    ["0-2","Negative pull-up","Turun pelan 5 detik, 4x5","Kuat kontrol turun 5 detik penuh 4x5"],
    ["3-4","Assisted pull-up","Kaki bantu ringan, 4x8","Bantuan minimal, RPE ≤8 di rep terakhir"],
    ["5-6","Full pull-up","Bisa 5+ reps tanpa bantuan","5+ reps bersih tanpa ayun/bantuan"],
    ["7-8","Wide-grip pull-up","3x8 grip lebar bahu","3x8 clean, tanpa nyeri siku"],
    ["9-10","Archer pull-up progression","3x6/sisi","3x6/sisi terkontrol"],
    ["11-12","L-sit pull-up","3x5 dengan kaki lurus","Syarat: 15+ pull-up bersih dulu"],
  ],
  "Push-up":[
    ["0-2","Push-up lutut","4x12 form rapi","4x12 form rapi tanpa pinggul turun"],
    ["3-4","Push-up standar","4x max, min 10 reps","Min 10 reps clean di semua set"],
    ["5-6","Decline push-up","3x10, kaki di kursi","3x10 tanpa nyeri bahu/siku"],
    ["7-8","Diamond push-up","3x10","3x10 clean, siku stabil"],
    ["9-10","Archer push-up","3x6/sisi","3x6/sisi terkontrol"],
    ["11-12","One-arm push-up progression","3x3/sisi dengan bantuan","Syarat: 20+ dip dulu"],
  ],
  "Squat":[
    ["0-2","Bodyweight squat","4x15 form rapi","4x15 depth penuh, lutut stabil"],
    ["3-4","Tempo squat (turun 3 detik)","4x12","4x12 tempo konsisten"],
    ["5-6","Squat beban tas/botol","4x15","4x15 tanpa nyeri lutut"],
    ["7-8","Bulgarian split squat","3x10/kaki","3x10/kaki seimbang kiri-kanan"],
    ["9-10","Jump squat","3x12","3x12 landing terkontrol"],
    ["11-12","Pistol squat progression","3x5/kaki dengan bantuan","Mobilitas pergelangan kaki cukup"],
  ],
};
const BASELINE_ITEMS = ["Pull-up (full)","Push-up (standar)","Squat bodyweight","Plank (detik)","Chin-up"];
const BASELINE_MAP = {
  "Pull-up (full)":"Pull-up",
  "Push-up (standar)":"Push-up",
  "Squat bodyweight":"Squat beban tas",
  "Plank (detik)":"Plank",
  "Chin-up":"Chin-up",
};

function buildGerakanOptions(){
  const set = new Set();
  JADWAL.forEach(day => day.moves.forEach(m => { if(m[0] !== '-') set.add(m[0]); }));
  for(const kategori in PROGRES){ PROGRES[kategori].forEach(row => set.add(row[1])); }
  return [...set];
}
const GERAKAN_OPTIONS = buildGerakanOptions();
const FOKUS_DOT = {Push:"fokus-push", Pull:"fokus-pull", Lower:"fokus-lower", Full:"fokus-full", Rest:"fokus-rest"};

/* ---------- STORAGE ---------- */
let memStore = {};
function storeGet(key, fb){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; }catch(e){ return memStore[key] ?? fb; } }
function storeSet(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ memStore[key] = val; } }
function vibrate(ms){ if(navigator.vibrate) navigator.vibrate(ms); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg || '✓ Tersimpan';
  t.classList.add('show');
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>t.classList.remove('show'), 1200);
}

/* ---------- CONFETTI ---------- */
function burstConfetti(x, y){
  const colors = ['#e0b94a','#82a879','#c15a45','#f3f2ec'];
  for(let i=0;i<14;i++){
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.left = x+'px'; p.style.top = y+'px';
    p.style.background = colors[i % colors.length];
    document.body.appendChild(p);
    const angle = (Math.PI*2*i)/14 + Math.random()*0.5;
    const dist = 40 + Math.random()*50;
    const dx = Math.cos(angle)*dist, dy = Math.sin(angle)*dist - 20;
    p.animate([
      {transform:'translate(0,0) rotate(0deg)', opacity:1},
      {transform:`translate(${dx}px, ${dy+70}px) rotate(${Math.random()*360}deg)`, opacity:0}
    ], {duration:700+Math.random()*300, easing:'cubic-bezier(.2,.8,.2,1)'}).onfinish = () => p.remove();
  }
}

/* ---------- TODAY / STREAK ---------- */
function todayHari(){
  const jsDay = new Date().getDay(); // 0=Sun
  const map = [6,0,1,2,3,4,5]; // convert to HARI_ORDER index (Senin=0)
  return HARI_ORDER[map[jsDay]];
}
function computeStreak(){
  const logs = storeGet('log_entries', []);
  const doneDates = new Set(logs.filter(l=>l.status==='Selesai').map(l=>l.tanggal));
  let streak = 0;
  let d = new Date();
  for(let i=0;i<365;i++){
    const iso = d.toISOString().slice(0,10);
    if(doneDates.has(iso)){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}
function renderStreak(){
  document.getElementById('streakPill').textContent = `🔥 ${computeStreak()} hari`;
}

/* ---------- RENDER: JADWAL ---------- */
function renderJadwal(){
  const today = todayHari();
  const el = document.getElementById('view-jadwal');
  let html = `
    <div class="card info-rest">
      <div class="info-rest-title">⏱️ Waktu Rest</div>
      <div class="info-rest-row"><span>Compound berat (pull-up, squat beban)</span><b>90-120 dtk</b></div>
      <div class="info-rest-row"><span>Push-up, dip, isolasi</span><b>60-90 dtk</b></div>
      <div class="info-rest-row"><span>Burpee / HIIT</span><b>30-45 dtk</b></div>
      <div class="info-rest-row"><span>Antar hari, otot sama</span><b>min. 48 jam</b></div>
    </div>
    <div class="card info-safety">
      <div class="info-rest-title">🦾 Proteksi Tendon Siku/Bahu</div>
      <div class="info-safety-item">Jangan gagal total tiap set. Sisakan 1-3 rep ("max-2").</div>
      <div class="info-safety-item">Selasa & Jumat pull-up beda grip, sebar stres tendon.</div>
      <div class="info-safety-item">Nyeri siku/bahu &gt;24 jam? Turunkan volume, jangan stop total.</div>
      <div class="info-safety-item">Kembali dari libur &gt;1 minggu? Mulai 50% volume biasa.</div>
    </div>
  `;
  html += JADWAL.map(day => `
    <div class="day-block ${day.hari===today?'today':''}">
      <div class="day-title">
        <span class="fokus-dot ${FOKUS_DOT[day.fokus]}"></span>${day.hari}
        ${day.hari===today ? '<span class="today-badge">HARI INI</span>' : ''}
      </div>
      ${day.moves.map(m => `
        <div class="move-card card">
          <div>
            <div class="move-name">${m[0]}</div>
            ${m[2] ? `<div class="move-sub">${m[2]}</div>` : ''}
          </div>
          <div class="move-rep-wrap">
            <div class="move-rep">${m[1]}</div>
            ${m[3] && m[3] !== '-' ? `<div class="move-rest">⏱ ${m[3]}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
  el.innerHTML = html;
}

/* ---------- RENDER: PROGRES ---------- */
function ringSvg(pct, id){
  const r = 16, c = 2*Math.PI*r;
  const offset = c - (pct/100)*c;
  return `<div class="ring-wrap">
    <svg class="ring" width="38" height="38" viewBox="0 0 38 38">
      <circle class="ring-bg" cx="19" cy="19" r="${r}"></circle>
      <circle class="ring-fg" cx="19" cy="19" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"></circle>
    </svg>
    <span class="ring-label">${pct}%</span>
  </div>`;
}
function renderProgres(){
  const state = storeGet('progres_state', {});
  const el = document.getElementById('view-progres');
  let html = '';
  for(const kategori in PROGRES){
    const items = PROGRES[kategori];
    const doneCount = items.filter((_,idx) => (state[kategori+'_'+idx]||{}).done).length;
    const pct = Math.round((doneCount/items.length)*100);
    html += `<div class="section-title">${kategori} ${ringSvg(pct)}</div>`;
    items.forEach((row, idx) => {
      const key = kategori + '_' + idx;
      const s = state[key] || {done:false, date:''};
      html += `
        <div class="variasi-row card">
          <div class="variasi-top">
            <div class="check-btn ${s.done ? 'done':''}" data-key="${key}">
              <svg viewBox="0 0 20 20"><path d="M4 10 L8 14 L16 5"></path></svg>
            </div>
            <div class="variasi-info">
              <div class="variasi-name">${row[1]}</div>
              <div class="variasi-crit">${row[2]}</div>
              <div class="variasi-gate">✅ Gate: ${row[3]}</div>
            </div>
            <div class="variasi-week">MGG ${row[0]}</div>
          </div>
          ${s.done ? `<div class="variasi-date">Tercapai: <input type="date" data-key="${key}" class="date-input" value="${s.date}"></div>` : ''}
        </div>
      `;
    });
  }
  el.innerHTML = html;

  el.querySelectorAll('.check-btn').forEach(chk => {
    chk.addEventListener('click', (e) => {
      const key = chk.dataset.key;
      const st = storeGet('progres_state', {});
      const cur = st[key] || {done:false, date:''};
      cur.done = !cur.done;
      if(cur.done && !cur.date){ cur.date = new Date().toISOString().slice(0,10); }
      st[key] = cur;
      storeSet('progres_state', st);
      vibrate(12);
      if(cur.done){
        const rect = chk.getBoundingClientRect();
        burstConfetti(rect.left+rect.width/2, rect.top+rect.height/2);
      }
      showToast(cur.done ? '✓ Progres dicatat' : 'Dibatalkan');
      renderProgres();
    });
  });
  el.querySelectorAll('.date-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const st = storeGet('progres_state', {});
      st[inp.dataset.key] = st[inp.dataset.key] || {done:true};
      st[inp.dataset.key].date = inp.value;
      storeSet('progres_state', st);
      showToast();
    });
  });
}

/* ---------- RENDER: BASELINE ---------- */
function renderBaseline(){
  const vals = storeGet('baseline_vals', {});
  const logs = storeGet('log_entries', []);
  const todayIso = new Date().toISOString().slice(0,10);
  const el = document.getElementById('baselineList');

  el.innerHTML = BASELINE_ITEMS.map(name => {
    const gerakanName = BASELINE_MAP[name];
    const todays = logs.filter(l => l.tanggal === todayIso && l.gerakan === gerakanName);
    if(todays.length > 0){
      const last = todays[todays.length - 1];
      const isPlank = name.includes('Plank');
      const setsNum = [last.s1,last.s2,last.s3,last.s4].map(x=>Number(x)||0);
      const value = isPlank ? Math.max(...setsNum) : setsNum.reduce((a,b)=>a+b,0);
      return `
        <div class="baseline-row card">
          <div>
            <label>${name}</label>
            <div class="baseline-auto-tag">🔄 auto dari log hari ini</div>
          </div>
          <input type="number" value="${value}" disabled>
        </div>
      `;
    }
    return `
      <div class="baseline-row card">
        <label>${name}</label>
        <input type="number" data-name="${name}" value="${vals[name] ?? ''}" placeholder="0">
      </div>
    `;
  }).join('');

  el.querySelectorAll('input:not([disabled])').forEach(inp => {
    inp.addEventListener('change', () => {
      const v = storeGet('baseline_vals', {});
      v[inp.dataset.name] = inp.value;
      storeSet('baseline_vals', v);
      showToast();
    });
  });
}

/* ---------- RENDER: VOLUME CHART ---------- */
function renderVolumeChart(){
  const logs = storeGet('log_entries', []);
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  const totals = days.map(iso => {
    return logs.filter(l=>l.tanggal===iso)
      .reduce((sum,l) => sum + [l.s1,l.s2,l.s3,l.s4].reduce((a,b)=>a+(Number(b)||0),0), 0);
  });
  const max = Math.max(...totals, 1);
  const el = document.getElementById('volBars');
  el.innerHTML = days.map((iso, i) => {
    const h = Math.max((totals[i]/max)*100, totals[i]>0 ? 8 : 2);
    const lbl = new Date(iso).toLocaleDateString('id-ID', {weekday:'short'}).slice(0,2);
    return `<div class="bar-col">
      <div class="bar" style="height:${h}%"></div>
      <div class="bar-lbl">${lbl}</div>
    </div>`;
  }).join('');
}

/* ---------- RENDER: LOG (with swipe-to-delete) ---------- */
function renderLog(){
  const logs = storeGet('log_entries', []);
  const el = document.getElementById('logList');
  document.getElementById('swipeHint').style.display = logs.length ? 'block' : 'none';
  if(logs.length === 0){
    el.innerHTML = `<div class="empty-state"><span class="big">🗒️</span>Belum ada log.<br>Isi form di atas tiap selesai latihan.</div>`;
    renderVolumeChart();
    return;
  }
  const sorted = [...logs].sort((a,b) => b.tanggal.localeCompare(a.tanggal));
  el.innerHTML = sorted.map((l) => {
    const totalReps = [l.s1,l.s2,l.s3,l.s4].reduce((a,b) => a + (Number(b)||0), 0);
    return `
    <div class="log-wrap" data-id="${l.id}">
      <div class="log-del-bg">HAPUS →</div>
      <div class="log-entry card">
        <div class="log-entry-top">
          <span class="log-date">${l.tanggal} · ${l.hari}</span>
          <span class="log-status status-${l.status}">${l.status}</span>
        </div>
        <div class="log-gerakan">${l.gerakan}</div>
        <div class="log-sets">${[l.s1,l.s2,l.s3,l.s4].filter(x=>x!=='').join(' / ') || '-'} &nbsp;·&nbsp; Total: ${totalReps} reps${l.rpe ? ' · RPE '+l.rpe : ''}</div>
        ${l.catatan ? `<div class="log-note">"${l.catatan}"</div>` : ''}
      </div>
    </div>
  `}).join('');

  el.querySelectorAll('.log-wrap').forEach(wrap => {
    const card = wrap.querySelector('.log-entry');
    let startX = 0, curX = 0, dragging = false;
    wrap.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; dragging = true; card.style.transition='none'; }, {passive:true});
    wrap.addEventListener('touchmove', (e) => {
      if(!dragging) return;
      curX = e.touches[0].clientX - startX;
      if(curX < 0) card.style.transform = `translateX(${Math.max(curX,-100)}px)`;
    }, {passive:true});
    wrap.addEventListener('touchend', () => {
      dragging = false;
      card.style.transition = 'transform .25s ease';
      if(curX < -70){
        card.style.transform = 'translateX(-100%)';
        setTimeout(() => {
          let logs = storeGet('log_entries', []);
          logs = logs.filter(l => String(l.id) !== wrap.dataset.id);
          storeSet('log_entries', logs);
          vibrate(15);
          renderLog(); renderStreak();
        }, 200);
      } else {
        card.style.transform = 'translateX(0)';
      }
      curX = 0;
    });
  });
  renderVolumeChart();
}

document.getElementById('logForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const logs = storeGet('log_entries', []);
  logs.push({
    id: Date.now(),
    tanggal: document.getElementById('f-tanggal').value,
    hari: document.getElementById('f-hari').value,
    gerakan: document.getElementById('f-gerakan').value,
    s1: document.getElementById('f-s1').value,
    s2: document.getElementById('f-s2').value,
    s3: document.getElementById('f-s3').value,
    s4: document.getElementById('f-s4').value,
    rpe: document.getElementById('f-rpe').value,
    status: document.getElementById('f-status').value,
    catatan: document.getElementById('f-catatan').value,
  });
  storeSet('log_entries', logs);
  vibrate(12);
  showToast('✓ Log disimpan');
  e.target.reset();
  document.getElementById('f-tanggal').valueAsDate = new Date();
  renderLog();
  renderStreak();
  renderBaseline();
});

/* ---------- NAV ---------- */
const titles = {jadwal:"Jadwal", progres:"Progres", log:"Log Latihan", baseline:"Baseline"};
const order = ['jadwal','progres','log','baseline'];
function moveIndicator(idx){
  document.getElementById('navIndicator').style.transform = `translateX(${idx*100}%)`;
}
document.querySelectorAll('nav.bottom button').forEach((btn, idx) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav.bottom button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.view;
    document.getElementById('view-' + v).classList.add('active');
    document.getElementById('pageTitle').textContent = titles[v];
    moveIndicator(idx);
    vibrate(8);
  });
});

/* ---------- EXPORT / IMPORT ---------- */
document.getElementById('btnExport').addEventListener('click', () => {
  const data = {
    progres_state: storeGet('progres_state', {}),
    baseline_vals: storeGet('baseline_vals', {}),
    log_entries: storeGet('log_entries', []),
    exported_at: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tracker-kalistenik-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  vibrate(12);
  showToast('⬇️ Backup diunduh');
});

document.getElementById('fileImport').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(data.progres_state) storeSet('progres_state', data.progres_state);
      if(data.baseline_vals) storeSet('baseline_vals', data.baseline_vals);
      if(data.log_entries) storeSet('log_entries', data.log_entries);
      renderProgres(); renderBaseline(); renderLog(); renderStreak();
      vibrate(15);
      showToast('✓ Data dipulihkan');
    }catch(err){
      showToast('✗ File tidak valid');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ---------- INIT ---------- */
document.getElementById('f-gerakan').innerHTML = GERAKAN_OPTIONS.map(g => `<option>${g}</option>`).join('');
document.getElementById('f-tanggal').valueAsDate = new Date();
renderJadwal();
renderProgres();
renderBaseline();
renderLog();
renderStreak();
moveIndicator(0);
</script>
